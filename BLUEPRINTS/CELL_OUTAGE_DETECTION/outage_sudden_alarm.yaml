intent: CELL_OUTAGE_DETECTION
blueprint_id: OUTAGE_SUDDEN_ALARM
description: >
  Sudden outage with OSS alarm and rapid KPI drop to zero.

context:
  area: urban
  time_window: 1h
  alarm: true
  tech: NR
  cell_role: macro

priors:
  time_of_day: { peak: 0.4, shoulder: 0.4, offpeak: 0.2 }
  traffic_mix: { eMBB: 0.9, enterprise_private: 0.1 }

constraints:
  availability:      { min: 0, max: 5 }
  throughput_p50_mbps:{ min: 0, max: 1 }
  user_drop_rate:    { min: 80, max: 100 }
  call_setup_fail:   { min: 80, max: 100 }

notes: >
  Immediate outage with alarm raised. Confirm via OSS query, validate KPIs dropped to zero, and escalate with a ticket.
