intent: BLER_ANOMALY
blueprint_id: BLER_INTERFERENCE_BURST
description: >
  Sudden interference burst elevates BLER, with moderate load and degraded SINR/RSRQ.

context:
  area: suburban
  time_window: 2h
  alarm: true
  tech: NR
  cell_role: macro


priors:
  time_of_day: { shoulder: 0.6, peak: 0.3, offpeak: 0.1 }
  traffic_mix: { eMBB: 0.8, FWA: 0.2 }

constraints:
  rsrp_dBm:    { min: -116, max: -98 }
  rsrq_dB:     { min: -17,  max: -9 }
  sinr_dB:     { min: -4,   max: 9 }
  PRB_util:    { min: 0.50, max: 0.85 }
  BLER:        { min: 0.08, max: 0.20 }
  icic_neighbor_load: { min: 0.60, max: 0.95 }     # proxy for neighbor pressure
  x2_ho_in_rate: { min: 2, max: 15 }               # handovers in, per 5 min
  throughput_p50_mbps:
    min: 3
    max: 18
    depends_on: sinr_dB
    corr: positive
  users:       { min: 80, max: 260, dist: triangular, mode: 150 }

notes: >
  Interference-driven BLER. Check neighbors/ICIC/ANR and power control. Tune MCS/power and mitigate interference sources.
