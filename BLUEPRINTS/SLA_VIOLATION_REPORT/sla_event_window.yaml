intent: SLA_VIOLATION_REPORT
blueprint_id: SLA_EVENT_WINDOW
description: >
  SLA breach concentrated within an event window; QoS composite drops below target.

context:
  area: stadium
  time_window: 6h
  alarm: true
  tech: NR
  cell_role: micro

priors:
  event_phase: { ingress: 0.3, in_event: 0.5, egress: 0.2 }
  traffic_mix: { eMBB: 0.95, enterprise_private: 0.05 }

constraints:
  QoS:                    { min: 0.0, max: 0.5 }            
  sla_threshold:          { min: 0.95, max: 1.0 }       
  sla_violation_ratio:   { min: 20,  max: 60 }            
  PRB_util:               { min: 0.80, max: 0.98 }
  latency_ms:             { min: 40,  max: 120 }
  BLER:                   { min: 0.03, max: 0.10 }
  throughput_p50_mbps:
    min: 2
    max: 14
    depends_on: PRB_util
    corr: negative
  users:                  { min: 300, max: 1200, dist: triangular, mode: 700 }

notes: >
  Report event-bounded SLA impact; confirm via KPIs and open a ticket for record/mitigation.
