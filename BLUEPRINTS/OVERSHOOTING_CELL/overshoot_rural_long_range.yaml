intent: OVERSHOOTING_CELL
blueprint_id: OVERSHOOT_RURAL_LONG_RANGE
description: >
  Rural high tower overshoots far beyond intended footprint, creating border HO issues and distant serving.

context:
  area: rural
  time_window: 12h
  alarm: false
  tech: NR
  cell_role: macro

priors:
  time_of_day: { mixed: 1.0 }
  traffic_mix: { eMBB: 0.7, FWA: 0.3 }

constraints:

  ta_p95_m:                { min: 800,  max: 3000 }            
  ta_std_m:                { min: 120,  max: 400 }
  distant_serving_ratio:  { min: 15,   max: 40 }              
  neighbor_distance_km:    { min: 3.0,  max: 12.0 }

  rsrp_dBm:                { min: -122, max: -105 }
  rsrq_dB:                 { min: -18,  max: -11 }
  sinr_dB:                 { min: -6,   max: 6 }

  ho_fail_rate:           { min: 8,    max: 20 }
  ping_pong_rate:         { min: 6,    max: 18 }
  rlf_rate:               { min: 2,    max: 8 }

  PRB_util:                { min: 0.35, max: 0.70 }
  throughput_p50_mbps:
    min: 2
    max: 12
    depends_on: sinr_dB
    corr: positive
  users:                   { min: 40,   max: 200, dist: triangular, mode: 110 }

notes: >
  Adjust antenna tilt/power to rein in footprint; audit neighbors near borders and update offsets if needed.
